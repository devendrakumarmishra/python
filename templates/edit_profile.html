{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<h2>Edit Profile</h2>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" value="{{ profile.full_name or '' }}">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ profile.email or '' }}">
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone" value="{{ profile.phone or '' }}">
        </div>
        <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4">{{ profile.bio or '' }}</textarea>
        </div>
        <button type="submit" class="btn">Save Changes</button>
        <a href="{{ url_for('profile') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
