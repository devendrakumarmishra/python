{% extends 'base.html' %}
{% block title %}Edit Note{% endblock %}

{% block content %}
<h2>Edit Note</h2>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ note.title }}" required>
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="8">{{ note.content }}</textarea>
        </div>
        <button type="submit" class="btn">Update Note</button>
        <a href="{{ url_for('view_note', note_id=note.id) }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
