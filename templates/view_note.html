{% extends 'base.html' %}
{% block title %}{{ note.title }}{% endblock %}

{% block content %}
<div class="note-view">
    <h2>{{ note.title }}</h2>
    <p class="note-date">Created: {{ note.created_at }}</p>
    <div class="note-content">
        {{ note.content }}
    </div>
    <div class="note-actions">
        <a href="{{ url_for('edit_note', note_id=note.id) }}" class="btn">Edit</a>
        <form method="POST" action="{{ url_for('delete_note', note_id=note.id) }}" style="display:inline;">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this note?')">Delete</button>
        </form>
        <a href="{{ url_for('notes') }}" class="btn btn-secondary">Back to Notes</a>
    </div>
</div>
{% endblock %}
