{% extends 'base.html' %}
{% block title %}Add Note{% endblock %}

{% block content %}
<h2>Add New Note</h2>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Note title" required>
        </div>
        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" rows="8" placeholder="Write your note here..."></textarea>
        </div>
        <button type="submit" class="btn">Save Note</button>
        <a href="{{ url_for('notes') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
