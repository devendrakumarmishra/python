{% extends 'base.html' %}
{% block title %}File Manager{% endblock %}

{% block content %}
<h2>File Manager</h2>

<!-- Upload Section -->
<div class="form-card">
    <h3>Upload a File</h3>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">Select File (png, jpg, pdf, txt, doc)</label>
            <input type="file" id="file" name="file" required>
        </div>
        <button type="submit" class="btn">Upload</button>
    </form>
</div>

<!-- File List Section -->
<div class="section" style="margin-top: 20px;">
    <h3>My Files</h3>
    {% if files %}
    <table class="data-table">
        <thead>
            <tr>
                <th>Filename</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for file in files %}
            <tr>
                <td>{{ file }}</td>
                <td>
                    <a href="{{ url_for('download_file', filename=file) }}" class="action-link">Download</a>
                    <form method="POST" action="{{ url_for('delete_file', filename=file) }}" style="display:inline;">
                        <button type="submit" class="action-link delete-link" onclick="return confirm('Delete this file?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No files uploaded yet.</p>
    {% endif %}
</div>
{% endblock %}
